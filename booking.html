<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | Ocean Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">Ocean Explorer</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="packages.html">Packages</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="booking.html" class="active">Booking</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main class="container">

    <h1 class="page-title">Book Your Submarine Tour</h1>

    <div class="form-container">

        <form id="bookingForm" onsubmit="return handleFormSubmit(event)">

            <label for="username">Full Name:</label>
            <input type="text"
                   id="username"
                   placeholder="please Enter your name"
                   required>

            <label for="useremail">Email Address:</label>
            <input type="email"
                   id="useremail"
                   placeholder="please Enter your email"
                   required>

            <label for="tour">Select Package:</label>
            <select id="tour">
                <option>Coral Reef Tour</option>
                <option>Deep Sea Adventure</option>
                <option>Shipwreck Exploration</option>
            </select>

            <label for="date">Travel Date:</label>
            <input type="date" id="date" required>

            <button type="submit" class="cta-btn">
                Book Now
            </button>

        </form>

    </div>

</main>

<footer>
    <p>&copy;A Wonderful worlds depth water path explorer </p>
</footer>

<script src="script.js"></script>

</body>
</html>
